# Demo reference config — matches the seeded gc_history.db topology (10 JVMs).
# SSH hosts are placeholders; metrics come from seed/seed_history.py unless you
# onboard with real endpoints and replace these hosts.
cluster: DEMO-KRAFT
region: DEMO
env: KRAFT
defaults:
  source: ssh
  user: kafka
  key_path: ~/.ssh/id_rsa
  port: 22
  kafka_home: /opt/kafka
nodes:
  - id: broker-1
    role: broker
    host: 10.0.1.11
    log_paths:
      - /opt/kafka/logs/kafkaServer-gc.log*
  - id: broker-2
    role: broker
    host: 10.0.1.12
    log_paths:
      - /opt/kafka/logs/kafkaServer-gc.log*
  - id: broker-3
    role: broker
    host: 10.0.1.13
    log_paths:
      - /opt/kafka/logs/kafkaServer-gc.log*
  - id: schema-registry-1
    role: schema-registry
    host: 10.0.1.21
    log_paths:
      - /opt/schema-registry/logs/schema-registry-gc.log*
  - id: schema-registry-2
    role: schema-registry
    host: 10.0.1.22
    log_paths:
      - /opt/schema-registry/logs/schema-registry-gc.log*
  - id: connect-1
    role: connect
    host: 10.0.1.31
    log_paths:
      - /opt/kafka/logs/connect-gc.log*
  - id: connect-2
    role: connect
    host: 10.0.1.32
    log_paths:
      - /opt/kafka/logs/connect-gc.log*
  - id: controller-1
    role: controller
    host: 10.0.1.41
    log_paths:
      - /opt/kafka/logs/kafkaServer-gc.log*
  - id: controller-2
    role: controller
    host: 10.0.1.42
    log_paths:
      - /opt/kafka/logs/kafkaServer-gc.log*
  - id: controller-3
    role: controller
    host: 10.0.1.43
    log_paths:
      - /opt/kafka/logs/kafkaServer-gc.log*

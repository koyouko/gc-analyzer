# Demo reference config — matches the seeded gc_history.db topology (10 JVMs).
# SSH hosts are placeholders; metrics come from seed/seed_history.py unless you
# onboard with real endpoints and replace these hosts.
cluster: DEMO-ZK
region: DEMO
env: ZOOKEEPER
defaults:
  source: ssh
  user: kafka
  key_path: ~/.ssh/id_rsa
  port: 22
  kafka_home: /opt/kafka
nodes:
  - id: broker-1
    role: broker
    host: 10.0.2.11
    log_paths:
      - /opt/kafka/logs/kafkaServer-gc.log*
  - id: broker-2
    role: broker
    host: 10.0.2.12
    log_paths:
      - /opt/kafka/logs/kafkaServer-gc.log*
  - id: broker-3
    role: broker
    host: 10.0.2.13
    log_paths:
      - /opt/kafka/logs/kafkaServer-gc.log*
  - id: schema-registry-1
    role: schema-registry
    host: 10.0.2.21
    log_paths:
      - /opt/schema-registry/logs/schema-registry-gc.log*
  - id: schema-registry-2
    role: schema-registry
    host: 10.0.2.22
    log_paths:
      - /opt/schema-registry/logs/schema-registry-gc.log*
  - id: connect-1
    role: connect
    host: 10.0.2.31
    log_paths:
      - /opt/kafka/logs/connect-gc.log*
  - id: connect-2
    role: connect
    host: 10.0.2.32
    log_paths:
      - /opt/kafka/logs/connect-gc.log*
  - id: zookeeper-1
    role: zookeeper
    host: 10.0.2.41
    log_paths:
      - /opt/zookeeper/logs/zookeeper-gc.log*
  - id: zookeeper-2
    role: zookeeper
    host: 10.0.2.42
    log_paths:
      - /opt/zookeeper/logs/zookeeper-gc.log*
  - id: zookeeper-3
    role: zookeeper
    host: 10.0.2.43
    log_paths:
      - /opt/zookeeper/logs/zookeeper-gc.log*

cluster: demo1
region: EMEA
env: DEV
defaults:
  source: ssh
  user: kafka
  key_path: ~/.ssh/id_rsa
  password: password123
  port: 22
  kafka_home: /opt/kafka
nodes:
  - id: broker-1
    role: broker
    host: 10.0.1.11
    port: 22
    user: kafka
    key_path: ~/.ssh/id_rsa
    password: password123
    kafka_home: /opt/kafka
    log_paths:
      - /opt/kafka/logs/kafkaServer-gc.log*
  - id: zk-1
    role: zookeeper
    host: 10.0.1.31
    log_paths:
      - /opt/zookeeper/logs/zookeeper-gc.log*
  - id: sr-1
    role: schema-registry
    host: 10.0.1.41
  - id: connect-1
    role: connect
    host: 10.0.1.51
  - id: local-broker-example
    role: broker
    source: local
    local_paths:
      - ./live-logs/broker1/kafkaServer-gc.log*

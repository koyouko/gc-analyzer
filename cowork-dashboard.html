<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BSP Kafka GC Analyzer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
  :root{
    --bg:#0e1117; --panel:#161b22; --panel2:#1c2230; --border:#2a3140;
    --txt:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
    --ok:#3fb950; --watch:#d29922; --crit:#f85149; --unknown:#6e7681;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--txt);
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:13px}
  header{display:flex;align-items:center;justify-content:space-between;
         padding:12px 20px;border-bottom:1px solid var(--border);background:var(--panel)}
  header h1{font-size:16px;margin:0;font-weight:650}
  header .sub{color:var(--muted);font-size:11px;margin-top:2px}
  .right{display:flex;align-items:center;gap:12px}
  .btn{background:var(--accent);color:#0b1020;border:0;border-radius:6px;padding:7px 13px;font-weight:600;cursor:pointer;font-size:12px}
  .btn:disabled{opacity:.5;cursor:wait}
  .statuspill{padding:4px 12px;border-radius:20px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .layout{display:flex;height:calc(100vh - 57px)}
  /* sidebar */
  .sidebar{width:310px;min-width:310px;border-right:1px solid var(--border);overflow-y:auto;background:var(--panel);padding:8px 0}
  .tree-row{display:flex;align-items:center;gap:7px;padding:5px 10px;cursor:pointer;user-select:none;white-space:nowrap}
  .tree-row:hover{background:var(--panel2)}
  .tree-row.sel{background:rgba(88,166,255,.16)}
  .tw{display:inline-block;width:12px;color:var(--muted);font-size:10px;text-align:center;flex:none}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .dot.ok{background:var(--ok)}.dot.watch{background:var(--watch)}.dot.crit{background:var(--crit)}.dot.unknown{background:var(--unknown)}
  .lbl{flex:1;overflow:hidden;text-overflow:ellipsis}
  .cnt{color:var(--muted);font-size:11px}
  .indent1{padding-left:20px}.indent2{padding-left:36px}.indent3{padding-left:54px}.indent4{padding-left:72px}
  .role-tag{font-size:10px;color:var(--muted);text-transform:uppercase}
  /* main */
  .main{flex:1;overflow-y:auto;padding:18px 22px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:13px 15px}
  .card .l{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.03em}
  .card .v{font-size:24px;font-weight:700;margin-top:5px}
  .card.ok{border-left:3px solid var(--ok)}.card.watch{border-left:3px solid var(--watch)}.card.crit{border-left:3px solid var(--crit)}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:20px 0 10px}
  .alerts{display:flex;flex-direction:column;gap:7px}
  .alert{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--border);
         border-left-width:3px;border-radius:7px;padding:9px 13px;cursor:pointer}
  .alert.critical{border-left-color:var(--crit)}.alert.warning{border-left-color:var(--watch)}
  .alert:hover{border-color:var(--accent)}
  .sev{font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:4px}
  .sev.critical{background:rgba(248,81,73,.18);color:var(--crit)}
  .sev.warning{background:rgba(210,153,34,.18);color:var(--watch)}
  .alert .where{font-weight:600}.alert .msg{color:var(--muted)}
  .grade{width:46px;height:46px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:#0b1020;flex:none}
  .grade.A{background:var(--ok)}.grade.B{background:#56d364}.grade.C{background:var(--watch)}
  .grade.D{background:#db6d28}.grade.F{background:var(--crit)}
  .metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:11px}
  .metric{background:var(--panel2);border-radius:7px;padding:9px 12px;position:relative}
  .metric .l{color:var(--muted);font-size:11px}.metric .v{font-size:17px;font-weight:700;margin-top:3px}
  .metric .info{color:var(--muted);font-size:10px;margin-left:4px;cursor:help;opacity:.6}
  .metric:hover .info{opacity:1;color:var(--accent)}
  .metric .tip{position:absolute;top:100%;left:0;margin-top:6px;z-index:50;display:none;width:230px;max-width:70vw;
    background:#0b0f16;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:11px;line-height:1.45;
    color:var(--txt);box-shadow:0 6px 20px rgba(0,0,0,.5);font-weight:400;text-transform:none;letter-spacing:0}
  .metric:hover .tip{display:block}
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:14px}
  .panel.full{grid-column:1/-1}
  .panel h3{margin:0 0 10px;font-size:12px;font-weight:650}
  .chartbox{position:relative;height:210px}
  ul.list{margin:0;padding-left:17px}ul.list li{margin:5px 0;line-height:1.4}
  .pros li{color:#7ee787}.cons li{color:#ffa198}.recs li{color:var(--txt)}
  .engine{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);padding:3px 9px;border-radius:18px;font-weight:600;font-size:11px}
  .muted{color:var(--muted)}
  .ihdr{display:flex;align-items:center;gap:13px;flex-wrap:wrap;margin-bottom:8px}
  .breadcrumb{color:var(--muted);font-size:12px;margin-bottom:3px}
  .empty{color:var(--muted);text-align:center;padding:60px 20px}
  .legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin:4px 0 14px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .nodegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:9px}
  .ncard{background:var(--panel);border:1px solid var(--border);border-left-width:3px;border-radius:8px;padding:9px 11px;cursor:pointer}
  .ncard:hover{border-color:var(--accent)}
  .ncard.ok{border-left-color:var(--ok)}.ncard.watch{border-left-color:var(--watch)}
  .ncard.critical{border-left-color:var(--crit)}.ncard.unknown{border-left-color:var(--unknown)}
  .ncard .nid{font-weight:600;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:6px}
  .ncard .nmeta{color:var(--muted);font-size:11px;margin-top:4px;display:flex;justify-content:space-between}
  .minigrade{font-size:11px;font-weight:800;padding:0 5px;border-radius:4px;color:#0b1020}
  .minigrade.A{background:var(--ok)}.minigrade.B{background:#56d364}.minigrade.C{background:var(--watch)}
  .minigrade.D{background:#db6d28}.minigrade.F{background:var(--crit)}
  .cfg{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:12px}
  .cfg .k{color:var(--muted)}
  .help{position:relative;cursor:help}
  .help .info{color:var(--muted);font-size:10px;margin-left:4px;opacity:.6}
  .help:hover .info{opacity:1;color:var(--accent)}
  .help .tip{position:absolute;top:100%;left:0;margin-top:6px;z-index:50;display:none;width:240px;max-width:70vw;
    background:#0b0f16;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:11px;line-height:1.45;
    color:var(--txt);box-shadow:0 6px 20px rgba(0,0,0,.5);font-weight:400}
  .help:hover .tip{display:block}
</style>
</head>
<body>
<header>
  <div>
    <h1 style="cursor:pointer" onclick="goHome()" title="Back to fleet overview">BSP Kafka GC Analyzer</h1>
    <div class="sub" id="sub">loading…</div>
  </div>
  <div class="right">
    <span class="statuspill" id="fleetPill">—</span>
    <button class="btn" id="refreshBtn" style="display:none">Refresh</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"><div class="empty">Loading fleet…</div></div>
</div>

  let m=p.match(/\/api\/cluster\/([^/]+)$/);

  if(m) return window.__STATIC__.trends[decodeURIComponent(m[1])];
  m=p.match(/\/api\/instance\/([^/]+)$/);

  throw new Error('unknown path '+p);

const SC={ok:'ok',watch:'watch',critical:'crit',unknown:'unknown'};
const METRIC_HELP={
  'Throughput':'Percentage of wall-clock time the application ran instead of being paused by GC. Higher is better — aim for ≥ 99%.',
  'Time in GC':'Share of wall-clock time spent inside stop-the-world GC pauses. The inverse of throughput; lower is better.',
  'Avg pause':'Average duration of a stop-the-world GC pause over the window. Application threads are frozen during each pause.',
  'p99 pause':'99th-percentile GC pause — 99% of pauses were shorter than this. Tail latency that directly affects Kafka request times.',
  'Max pause':'Longest single stop-the-world pause in the window. Long pauses can trip request.timeout, shrink the ISR, and stall produce/fetch.',
  'GC freq':'Garbage collections per minute. Very high frequency points to a hot allocation path or an undersized young generation.',
  'Full GCs (24h)':'Count of Full GCs (whole-heap compaction with all threads stopped) in the last 24h. Should be 0 on a healthy broker.',
  'Heap max':'Configured maximum heap size (-Xmx) for this JVM process.',
  'Avg live set':'Average post-GC heap occupancy as a percentage of max heap — the steady-state live memory footprint after collections.',
  'Peak live set':'Highest post-GC heap occupancy as a percentage of max heap. Near 100% means little headroom before OutOfMemoryError.',
  'Promotion trend':'How often the post-GC live set grew versus the previous collection. A steady climb hints at a memory leak or growing cache.'
};
const MEM_HELP={
  'Total heap':'Sum of -Xmx (max heap) across every JVM in this cluster.',
  'In use (live set)':'Combined post-GC live memory currently held across all nodes — the real footprint after garbage is collected.',
  'Used of heap':'Cluster live set as a percentage of total allocated heap. Lower leaves more headroom for spikes.',
  'Peak node util':'Highest single-node post-GC heap occupancy in the cluster. Near 100% means that node is close to OutOfMemoryError.'
};
const TEL_HELP={
  'GC engine':'The garbage collector each JVM is running (e.g. G1). Modern Kafka defaults to and is tuned for G1.',
  'GC log format':'Format of the GC logs being parsed. Unified (-Xlog:gc*) is the Java 11+ standard.',
  'Pause target':"G1's MaxGCPauseMillis goal — the pause time G1 tries to stay under per collection.",
  'Avg throughput':'Average percentage of wall-clock time across the cluster spent running the app rather than paused in GC. Aim ≥ 99%.',
  'Full GCs (1h / 24h)':'Count of Full GCs (whole-heap stop-the-world compactions) across the cluster in the last hour and last 24 hours. Should be 0.',
  'Worst pause (now)':'Longest stop-the-world GC pause observed on any node in the most recent sample. Long pauses risk request timeouts and ISR shrink.',
  'Heap sizing':'Configured max heap (-Xmx) per component role in this cluster.'
};
const esc=s=>String(s).replace(/"/g,'&quot;');
const memMetric=(label,valueHtml)=>{const h=MEM_HELP[label]||'';return `<div class="metric"${h?` title="${esc(h)}"`:''}><div class="l">${label}${h?'<span class="info">ⓘ</span>':''}</div><div class="v">${valueHtml}</div>${h?`<span class="tip">${h}</span>`:''}</div>`;};
const cfgKey=label=>{const h=TEL_HELP[label]||'';return h?`<span class="k help" title="${esc(h)}">${label}<span class="info">ⓘ</span><span class="tip">${h}</span></span>`:`<span class="k">${label}</span>`;};
const PILL={ok:'var(--ok)',watch:'var(--watch)',critical:'var(--crit)',unknown:'var(--unknown)'};
let FLEET=null, SELECTED=null, charts={}, expanded={};

/* api() overridden */
function fmtDay(ts){return new Date(ts*1000).toLocaleDateString([], {month:'short',day:'numeric'});}
function fmtTime(ts){return new Date(ts*1000).toLocaleString();}

/* ---------------- sidebar tree ---------------- */
function dot(s){return `<span class="dot ${SC[s]||'unknown'}"></span>`;}
function tw(open){return `<span class="tw">${open?'▾':'▸'}</span>`;}

function renderTree(){
  const sb=document.getElementById('sidebar'); let h='';
  for(const r of FLEET.regions){
    const rk='r:'+r.region, ro=expanded[rk]!==false; // regions default open
    h+=`<div class="tree-row" onclick="toggle('${rk}')">${tw(ro)}${dot(r.status)}<span class="lbl"><b>${r.region}</b></span></div>`;
    if(!ro) continue;
    for(const e of r.envs){
      const ek='e:'+r.region+e.env, eo=expanded[ek]===true;
      const al=e.alert_count?`<span class="cnt"> ⚠${e.alert_count}</span>`:'';
      const sel=SELECTED==='cluster:'+e.cluster?'sel':'';
      h+=`<div class="tree-row indent1 ${sel}" onclick="selectCluster('${e.cluster}')" title="Open ${e.cluster} cluster dashboard">`
        +`<span class="tw" onclick="toggle('${ek}');event.stopPropagation()">${eo?'▾':'▸'}</span>`
        +`${dot(e.status)}<span class="lbl">${e.env}</span>${al}</div>`;
      if(!eo) continue;
      for(const g of e.groups){
        const gk='g:'+e.cluster+g.group, go=expanded[gk]===true;
        h+=`<div class="tree-row indent2" onclick="toggle('${gk}')">${tw(go)}${dot(g.status)}<span class="lbl">${g.label}</span><span class="cnt">${g.count}</span></div>`;
        if(!go) continue;
        for(const i of g.instances){
          const sel=SELECTED===i.id?'sel':'';
          h+=`<div class="tree-row indent3 ${sel}" onclick="selectInstance('${i.id}',event)">${dot(i.status)}<span class="lbl">${i.id.split('-').slice(-2).join('-')}</span>${i.full_gc_1h?'<span class="cnt">🔴</span>':''}</div>`;
        }
      }
    }
  }
  sb.innerHTML=h;
}
function toggle(k){expanded[k]=k.startsWith('r:')?(expanded[k]===false?true:false):!expanded[k];renderTree();}

/* auto-expand paths that contain critical/watch instances */
function autoExpand(){
  for(const r of FLEET.regions){
    for(const e of r.envs){
      if(e.status==='critical'||e.status==='watch'){
        expanded['e:'+r.region+e.env]=true;
        for(const g of e.groups){
          if(g.status==='critical'||g.status==='watch') expanded['g:'+e.cluster+g.group]=true;
        }
      }
    }
  }
}

/* ---------------- fleet overview ---------------- */
function renderFleet(){
  const c=FLEET.counts;
  document.getElementById('main').innerHTML=`
    <div class="breadcrumb">Fleet overview · ${FLEET.total_instances} JVM components · snapshot ${fmtTime(FLEET.now)}</div>
    <div class="cards">
      <div class="card ok"><div class="l">Healthy</div><div class="v">${c.ok||0}</div></div>
      <div class="card watch"><div class="l">Watch</div><div class="v">${c.watch||0}</div></div>
      <div class="card crit"><div class="l">Critical</div><div class="v">${c.critical||0}</div></div>
      <div class="card"><div class="l">Total components</div><div class="v">${FLEET.total_instances}</div></div>
      <div class="card"><div class="l">Active alerts (1h)</div><div class="v">${FLEET.active_alerts.length}</div></div>
    </div>
    <h2>Issues in the last hour</h2>
    <div class="legend">
      <span>${dot('ok')} healthy</span><span>${dot('watch')} watch</span>
      <span>${dot('critical')} critical</span><span>🔴 Full GC in last hour</span>
    </div>
    <div class="alerts">${FLEET.active_alerts.length?FLEET.active_alerts.map(a=>`
      <div class="alert ${a.severity}" onclick="selectInstance('${a.instance_id}')">
        <span class="sev ${a.severity}">${a.severity}</span>
        <span class="where">${a.instance_id}</span>
        <span class="msg">${a.msg}</span>
      </div>`).join(''):'<div class="muted">No GC issues detected across the fleet in the last hour.</div>'}</div>
    <h2 style="margin-top:26px">Tip</h2>
    <div class="muted">Pick any component in the left tree (or click an alert) to see its current health and 30-day JVM heap / GC trends.</div>`;
}

/* ---------------- cluster overview ---------------- */
async function selectCluster(cluster){
  SELECTED='cluster:'+cluster; renderTree();
  const main=document.getElementById('main'); main.innerHTML='<div class="empty">Loading '+cluster+'…</div>';
  try{ renderCluster(await api('/api/cluster/'+cluster)); }
  catch(e){ main.innerHTML=`<div class="empty">Failed: ${e.message}</div>`; }
}

function ncard(n){
  return `<div class="ncard ${SC[n.status]}" onclick="selectInstance('${n.id}')">
    <div class="nid"><span>${n.id.split('-').slice(-2).join('-')}</span>
      ${n.grade?`<span class="minigrade ${n.grade}">${n.grade}</span>`:''}</div>
    <div class="nmeta"><span>${n.role}</span><span>heap ${n.heap_after_pct!=null?n.heap_after_pct+'%':'—'}</span></div>
    ${n.full_gc_1h?'<div class="nmeta" style="color:var(--crit)">🔴 Full GC in last hour</div>':''}
  </div>`;
}

function renderCluster(v){
  destroy();
  const m=v.memory, t=v.telemetry, cfg=v.config, c=v.counts;
  const heapRoles=Object.entries(cfg.heap_by_role).map(([r,s])=>`${r} ${s.join('/')} MB`).join(' · ');
  const cards=[
    {l:'Total nodes',v:c.total},
    {l:'Healthy',v:c.healthy,cls:'ok'},
    {l:'Unhealthy',v:c.unhealthy,cls:c.unhealthy?'crit':'ok'},
    {l:'Cluster memory',v:`${(m.used_mb/1024).toFixed(1)}<span class="muted" style="font-size:13px"> / ${(m.total_heap_mb/1024).toFixed(0)} GB</span>`},
    {l:'Avg heap util',v:m.avg_util_pct+'%'},
    {l:'GC engine',v:cfg.gc_engine.join(', ')},
  ];
  const attention=v.attention.length?v.attention.map(n=>`
    <div class="alert ${n.status==='critical'?'critical':'warning'}" onclick="selectInstance('${n.id}')">
      <span class="sev ${n.status==='critical'?'critical':'warning'}">${n.status}</span>
      <span class="where">${n.id}</span>
      <span class="msg">${(n.alerts[0]&&n.alerts[0].msg)||n.reason||('grade '+n.grade)}</span>
      ${n.grade?`<span class="minigrade ${n.grade}" style="margin-left:auto">${n.grade}</span>`:''}
    </div>`).join(''):'<div class="muted">All nodes healthy — nothing needs attention. 🟢</div>';

  document.getElementById('main').innerHTML=`
    <div class="breadcrumb">${v.region} › ${v.env}</div>
    <div class="ihdr">
      <span class="statuspill" style="background:${PILL[v.status]};color:#0b1020">${v.status}</span>
      <div style="font-size:18px;font-weight:700">${v.cluster} cluster</div>
      <span class="muted">snapshot ${fmtTime(v.now)}</span>
    </div>
    <div class="cards">${cards.map(x=>`<div class="card ${x.cls||''}"><div class="l">${x.l}</div><div class="v">${x.v}</div></div>`).join('')}</div>

    <div class="panels">
      <div class="panel"><h3>Cluster memory</h3>
        <div class="metric-grid">
          ${memMetric('Total heap',`${(m.total_heap_mb/1024).toFixed(0)} GB`)}
          ${memMetric('In use (live set)',`${(m.used_mb/1024).toFixed(1)} GB`)}
          ${memMetric('Used of heap',`${m.used_pct}%`)}
          ${memMetric('Peak node util',`${m.peak_util_pct}%`)}
        </div>
      </div>
      <div class="panel"><h3>Java / GC configuration &amp; telemetry</h3>
        <div class="cfg">
          ${cfgKey('GC engine')}<span>${cfg.gc_engine.join(', ')}</span>
          ${cfgKey('GC log format')}<span>${cfg.log_format}</span>
          ${cfgKey('Pause target')}<span>${cfg.pause_target_ms} ms (MaxGCPauseMillis)</span>
          ${cfgKey('Avg throughput')}<span>${t.avg_throughput_pct}%</span>
          ${cfgKey('Full GCs (1h / 24h)')}<span style="color:${t.full_gc_1h?'var(--crit)':'inherit'}">${t.full_gc_1h} / ${t.full_gc_24h}</span>
          ${cfgKey('Worst pause (now)')}<span style="color:${t.worst_pause_ms>500?'var(--crit)':'inherit'}">${t.worst_pause_ms} ms</span>
          ${cfgKey('Heap sizing')}<span>${heapRoles}</span>
        </div>
      </div>
    </div>

    <h2>Nodes — current GC health</h2>
    <div class="legend"><span>${dot('ok')} healthy</span><span>${dot('watch')} watch</span><span>${dot('critical')} critical</span><span>🔴 Full GC in last hour</span></div>
    <div class="nodegrid">${v.nodes.map(ncard).join('')}</div>

    <h2 style="margin-top:24px">Needs attention${v.attention.length?` (${v.attention.length})`:''} — click to investigate</h2>
    <div class="alerts">${attention}</div>`;
}

/* ---------------- instance detail ---------------- */
async function selectInstance(id,ev){
  if(ev) ev.stopPropagation();
  SELECTED=id; renderTree();
  const main=document.getElementById('main'); main.innerHTML='<div class="empty">Loading '+id+'…</div>';
  const [snap,tr]=await Promise.all([api('/api/instance/'+id),api('/api/instance/'+id+'/trends?days=30')]);
  renderInstance(snap,tr);
}

function renderInstance(s,tr){
  const m=s.metrics,h=s.health,inst=s.instance;
  const status = s.alerts.some(a=>a.severity==='critical')?'critical':(s.alerts.length||['C','D','F'].includes(h.grade))?'watch':'ok';
  const alertHtml=s.alerts.length?`<div class="alerts" style="margin:6px 0 4px">${s.alerts.map(a=>`
    <div class="alert ${a.severity}"><span class="sev ${a.severity}">${a.severity}</span><span class="msg">${a.msg}</span></div>`).join('')}</div>`:'';
  const mc=[
    ['Throughput',m.throughput_pct+'%'],['Time in GC',m.pct_time_in_gc+'%'],
    ['Avg pause',m.avg_pause_ms+' ms'],['p99 pause',m.p99_pause_ms+' ms'],['Max pause',m.max_pause_ms+' ms'],
    ['GC freq',m.gc_per_min+'/min'],['Full GCs (24h)',m.full_count],
    ['Heap max',m.heap_max_mb+' MB'],['Avg live set',m.avg_heap_after_pct+'%'],['Peak live set',m.peak_heap_after_pct+'%'],
    ['Promotion trend',m.promotion_trend_pct+'%'],
  ];
  document.getElementById('main').innerHTML=`
    <div class="breadcrumb">${inst.region} › ${inst.env} › ${inst.cluster} › ${inst.role}</div>
    <div class="ihdr">
      <div class="grade ${h.grade}">${h.grade}</div>
      <div><div style="font-size:18px;font-weight:700">${inst.id}</div>
        <div class="muted">${h.score} / 100 · ${h.status} · heap ${inst.heap_max_mb} MB</div></div>
      <span class="engine"><span class="dot ${SC[status]}"></span> ${inst.collector} · ${inst.role}</span>
    </div>
    <div class="muted" style="margin-bottom:8px">${h.reasons.join(' · ')||'No issues detected.'}</div>
    ${alertHtml}
    <h2>Current metrics (24h window)</h2>
    <div class="metric-grid">${mc.map(([l,v])=>{const hlp=METRIC_HELP[l]||'';return `<div class="metric"${hlp?` title="${hlp.replace(/"/g,'&quot;')}"`:''}><div class="l">${l}${hlp?'<span class="info">ⓘ</span>':''}</div><div class="v">${v}</div>${hlp?`<span class="tip">${hlp}</span>`:''}</div>`;}).join('')}</div>
    <h2>30-day trends</h2>
    <div class="panels">
      <div class="panel"><h3>Heap live set vs max (MB)</h3><div class="chartbox"><canvas id="cHeap"></canvas></div></div>
      <div class="panel"><h3>Heap utilization (%)</h3><div class="chartbox"><canvas id="cUtil"></canvas></div></div>
      <div class="panel"><h3>GC pause trend — p99 &amp; max (ms)</h3><div class="chartbox"><canvas id="cPause"></canvas></div></div>
      <div class="panel"><h3>Full GCs per day &amp; time-in-GC (%)</h3><div class="chartbox"><canvas id="cFull"></canvas></div></div>
    </div>
    <div class="panels">
      <div class="panel"><h3 style="color:#7ee787">Pros</h3><ul class="list pros">${(s.findings.pros||[]).map(x=>`<li>${x}</li>`).join('')||'<li class="muted">—</li>'}</ul></div>
      <div class="panel"><h3 style="color:#ffa198">Cons</h3><ul class="list cons">${(s.findings.cons||[]).map(x=>`<li>${x}</li>`).join('')||'<li class="muted">None.</li>'}</ul></div>
      <div class="panel full"><h3 style="color:var(--accent)">How to improve</h3><ul class="list recs">${(s.findings.recommendations||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>
    </div>`;
  drawTrends(tr);
}

function destroy(){Object.values(charts).forEach(c=>c.destroy());charts={};}
function baseOpts(){return{responsive:true,maintainAspectRatio:false,animation:false,
  interaction:{mode:'index',intersect:false},
  plugins:{legend:{labels:{boxWidth:11,font:{size:10}}}},
  scales:{x:{ticks:{maxTicksLimit:8,font:{size:9}}},y:{ticks:{font:{size:9}}}}};}

function drawTrends(tr){
  destroy();
  Chart.defaults.color='#8b949e';Chart.defaults.borderColor='#2a3140';
  const s=tr.series,labels=s.map(p=>fmtDay(p.t)),hmax=tr.heap_max_mb;

  charts.heap=new Chart(cHeap,{type:'line',data:{labels,datasets:[
    {label:'avg live set',data:s.map(p=>p.heap_used_avg),borderColor:'#3fb950',backgroundColor:'rgba(63,185,80,.12)',fill:true,pointRadius:0,borderWidth:1.4,tension:.25},
    {label:'peak live set',data:s.map(p=>p.heap_used_max),borderColor:'#58a6ff',pointRadius:0,borderWidth:1,tension:.25},
    {label:'heap max',data:s.map(()=>hmax),borderColor:'#8b949e',borderDash:[5,4],pointRadius:0,borderWidth:1}
  ]},options:baseOpts()});

  charts.util=new Chart(cUtil,{type:'line',data:{labels,datasets:[
    {label:'live set % of heap',data:s.map(p=>p.heap_after_pct_avg),borderColor:'#d29922',backgroundColor:'rgba(210,153,34,.12)',fill:true,pointRadius:0,borderWidth:1.4,tension:.25}
  ]},options:{...baseOpts(),scales:{...baseOpts().scales,y:{suggestedMax:100,ticks:{font:{size:9}}}}}});

  charts.pause=new Chart(cPause,{type:'line',data:{labels,datasets:[
    {label:'p99',data:s.map(p=>p.pause_p99_max),borderColor:'#58a6ff',pointRadius:0,borderWidth:1.3,tension:.25},
    {label:'max',data:s.map(p=>p.pause_max),borderColor:'#f85149',backgroundColor:'rgba(248,81,73,.10)',fill:true,pointRadius:0,borderWidth:1.3,tension:.25}
  ]},options:baseOpts()});

  charts.full=new Chart(cFull,{data:{labels,datasets:[
    {type:'bar',label:'Full GCs/day',data:s.map(p=>p.full_gc),backgroundColor:'#f85149',yAxisID:'y'},
    {type:'line',label:'time in GC %',data:s.map(p=>p.time_in_gc_avg),borderColor:'#d29922',pointRadius:0,borderWidth:1.4,tension:.25,yAxisID:'y1'}
  ]},options:{...baseOpts(),scales:{
    x:{ticks:{maxTicksLimit:8,font:{size:9}}},
    y:{position:'left',beginAtZero:true,ticks:{font:{size:9}},title:{display:true,text:'Full GCs',font:{size:9}}},
    y1:{position:'right',beginAtZero:true,grid:{drawOnChartArea:false},ticks:{font:{size:9}},title:{display:true,text:'% in GC',font:{size:9}}}
  }}});
}

function goHome(){ SELECTED=null; renderTree(); renderFleet(); }

/* ---------------- boot ---------------- */
async function load(){
  const b=document.getElementById('refreshBtn');b.disabled=true;b.textContent='Loading…';
  try{
    FLEET=await api('/api/fleet');
    document.getElementById('sub').textContent=`${FLEET.total_instances} components · ${FLEET.regions.length} regions`;
    const pill=document.getElementById('fleetPill');
    pill.textContent=FLEET.fleet_status;pill.style.background=PILL[FLEET.fleet_status];pill.style.color='#0b1020';
    autoExpand();renderTree();
    if(SELECTED) selectInstance(SELECTED); else renderFleet();
  }catch(e){
    document.getElementById('main').innerHTML=`<div class="empty">Failed to load: ${e.message}</div>`;
  }finally{b.disabled=false;b.textContent='Refresh';}
}
load();
</script>
</body>
</html>

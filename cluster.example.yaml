# Kafka GC Analyzer — cluster configuration example
#
# Copy to cluster.yaml and edit. Run with:
#     python -m gcanalyzer.app --config cluster.yaml
#
# Each node's GC logs are pulled over SSH. If you omit `log_paths`, the analyzer
# uses role-based defaults under `kafka_home` (e.g. <kafka_home>/logs/kafkaServer-gc.log*).
# Globs are supported so rotated logs (…-gc.log.0, .1, …) are all collected.

cluster: Production Kafka Cluster

# Values here apply to every node unless the node overrides them.
defaults:
  source: ssh
  user: kafka
  key_path: ~/.ssh/id_rsa      # path to your private key (on the machine running the analyzer)
  port: 22
  kafka_home: /opt/kafka       # default GC-log location is <kafka_home>/logs

nodes:
  - id: broker-1
    role: broker
    host: 10.0.1.11
    # log_paths override the default location when your logs live elsewhere:
    # log_paths:
    #   - /var/log/kafka/kafkaServer-gc.log*

  - id: broker-2
    role: broker
    host: 10.0.1.12

  - id: broker-3
    role: broker
    host: 10.0.1.13

  - id: controller-1          # KRaft controller / history node
    role: controller
    host: 10.0.1.21
    kafka_home: /opt/kafka

  - id: zookeeper-1
    role: zookeeper
    host: 10.0.1.31
    kafka_home: /opt/zookeeper
    log_paths:
      - /opt/zookeeper/logs/zookeeper-gc.log*

  # A node whose logs you have already copied to the analyzer host:
  # - id: broker-archive
  #   role: broker
  #   source: local
  #   local_paths:
  #     - ./incoming/broker-archive-gc.log
